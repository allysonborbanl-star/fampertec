{% extends "base.html" %}

{% block title %}{% if perfil %}Editar Perfil{% else %}Cadastro de Perfil{% endif %} | Fampertec{% endblock %}

{% block content %}
  <h1>{% if perfil %}Editar Perfil{% else %}Cadastro de Perfil{% endif %}</h1>
  <p class="muted">Preencha os dados abaixo.</p>

  <form method="post" class="form">
    {% csrf_token %}

    <div class="form__grid">
      <label class="field">
        <span class="field__label">{{ form.nome_completo.label }}</span>
        {{ form.nome_completo }}
        {% if form.nome_completo.errors %}<span class="field__error">{{ form.nome_completo.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.email.label }}</span>
        {{ form.email }}
        {% if form.email.errors %}<span class="field__error">{{ form.email.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.telefone.label }}</span>
        {{ form.telefone }}
        {% if form.telefone.errors %}<span class="field__error">{{ form.telefone.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.cargo.label }}</span>
        {{ form.cargo }}
        {% if form.cargo.errors %}<span class="field__error">{{ form.cargo.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.data_nascimento.label }}</span>
        {{ form.data_nascimento }}
        {% if form.data_nascimento.errors %}<span class="field__error">{{ form.data_nascimento.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field field--small">
        <span class="field__label">{{ form.controle_acesso.label }}</span>
        {{ form.controle_acesso }}
        {% if form.controle_acesso.errors %}<span class="field__error">{{ form.controle_acesso.errors|striptags }}</span>{% endif %}
      </label>
    </div>

    <div class="form__actions">
      <button class="btn" type="submit">Salvar</button>
      <a class="btn btn--ghost" href="{% url 'lista_perfis' %}">Voltar</a>
    </div>
  </form>
{% endblock %}
