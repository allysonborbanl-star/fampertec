{% extends "base.html" %}

{% block title %}{% if evento %}Editar Evento{% else %}Eventos{% endif %} | Fampertec{% endblock %}

{% block content %}
  <h1>{% if evento %}Editar Evento{% else %}Eventos{% endif %}</h1>
  <p class="muted">Preencha os dados abaixo.</p>

  <form method="post" class="form{% if evento %} form--editar-evento{% endif %}" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form__grid">
      <label class="field">
        <span class="field__label">{{ form.data_evento.label }}</span>
        {{ form.data_evento }}
        {% if form.data_evento.errors %}<span class="field__error">{{ form.data_evento.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.horario_evento.label }}</span>
        {{ form.horario_evento }}
        {% if form.horario_evento.errors %}<span class="field__error">{{ form.horario_evento.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.evento.label }}</span>
        {{ form.evento }}
        {% if form.evento.errors %}<span class="field__error">{{ form.evento.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.local.label }}</span>
        {{ form.local }}
        {% if form.local.errors %}<span class="field__error">{{ form.local.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field field--file">
        <span class="field__label">{{ form.imagem_capa.label }}</span>
        {{ form.imagem_capa }}
        {% if form.imagem_capa.errors %}<span class="field__error">{{ form.imagem_capa.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field field--file field--imagem-1">
        <span class="field__label">{{ form.imagem_1.label }}</span>
        {{ form.imagem_1 }}
        {% if form.imagem_1.errors %}<span class="field__error">{{ form.imagem_1.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field field--file">
        <span class="field__label">{{ form.documento.label }}</span>
        {{ form.documento }}
        {% if form.documento.errors %}<span class="field__error">{{ form.documento.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field">
        <span class="field__label">{{ form.visualizacao.label }}</span>
        {{ form.visualizacao }}
        {% if form.visualizacao.errors %}<span class="field__error">{{ form.visualizacao.errors|striptags }}</span>{% endif %}
      </label>

      <label class="field field--full">
        <span class="field__label">{{ form.descricao.label }}</span>
        {{ form.descricao }}
        {% if form.descricao.errors %}<span class="field__error">{{ form.descricao.errors|striptags }}</span>{% endif %}
      </label>
    </div>

    <div class="form__actions">
      <button class="btn" type="submit">Salvar</button>
      <a class="btn btn--ghost" href="{% url 'lista_eventos' %}">Voltar</a>
    </div>
  </form>
{% endblock %}
